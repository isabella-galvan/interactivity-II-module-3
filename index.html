<!DOCTYPE html>
<html>
<head>
  <title>Prufrock's Mantra</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      font-family: Arial, sans-serif;
      transition: all 2s ease;
    }

    #text {
      font-size: 2rem;
      transition: all 1s ease;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="text">Prufrock’s like my mantra</div>

  <script>
    const text = document.getElementById("text");
    const lines = [
      "Prufrock’s like my mantra",
      "Do I dare?",
      "Do I dare disturb the universe?",
      "In a minute there is time..."
    ];
    let index = 0;
    let dreamyStarted = false;

    text.addEventListener("mouseover", () => {
      // start the dreamy background on first hover
      if (!dreamyStarted) {
        document.body.style.background = "#3a2b1c";
        document.body.style.color = "#f5e6c8";
        document.body.style.fontFamily = "Georgia, serif";
        dreamyStarted = true;
      }

      // cycle through the lines
      index = (index + 1) % lines.length;
      text.innerText = lines[index];
    });
  </script>
</body>
</html>
