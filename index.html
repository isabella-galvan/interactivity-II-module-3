<!DOCTYPE html>
<html>
<head>
  <title>The Love Song of J. Alfred Prufrock</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: Arial, sans-serif;
      transition: all 3s ease;
      overflow: hidden;
    }

    #text {
      font-size: 2rem;
      transition: all 3s ease;
    }

    .dream {
      background: radial-gradient(circle, #3a2b1c, #0d0b0a);
      color: #f5e6c8;
      font-family: "Georgia", serif;
      letter-spacing: 2px;
    }

    .echo {
      position: absolute;
      opacity: 0.1;
      font-size: 2rem;
      color: #f5e6c8;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      from {
        transform: translateY(0px);
        opacity: 0.1;
      }
      to {
        transform: translateY(-200px);
        opacity: 0;
      }
    }
  </style>
</head>

<body onclick="startDream()">

<div id="text">"Prufrock’s like... my mantra!"</div>

<script>
let started = false;

function startDream() {
  if (started) return;
  started = true;

  // shift into "1920s dream"
  document.body.classList.add("dream");

  let text = document.getElementById("text");

  setTimeout(() => {
    text.innerText = "Do I dare?";
  }, 2000);

  setTimeout(() => {
    text.innerText = "Do I dare disturb the universe?";
  }, 4000);

  setTimeout(() => {
    text.innerText = "In a minute there is time...";
  }, 6000);

  // create floating echoes
  setInterval(() => {
    let echo = document.createElement("div");
    echo.className = "echo";
    echo.innerText = "For I have known them all already, known them all <br> Have known the evenings, mornings, afternoons, <br> I have measured out my life with coffee spoons; <br> I know the voices dying with a dying fall <br> Beneath the music from a farther room. <br> So how should I presume?";

    echo.style.left = Math.random() * window.innerWidth + "px";
    echo.style.top = window.innerHeight + "px";

    document.body.appendChild(echo);

    setTimeout(() => {
      echo.remove();
    }, 6000);
  }, 800);
}
</script>
 


</body>
</html>
