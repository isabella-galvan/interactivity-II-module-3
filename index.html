<script>
let started = false;

function startDream() {
  if (started) return;
  started = true;

  // shift into "1920s dream"
  document.body.classList.add("dream");

  let text = document.getElementById("text");

  setTimeout(() => {
    text.innerText = "Do I dare?";
  }, 2000);

  setTimeout(() => {
    text.innerText = "Do I dare disturb the universe?";
  }, 4000);

  setTimeout(() => {
    text.innerText = "In a minute there is time...";

const lines = [
  '"Prufrock’s like... my mantra!"',
  "Do I dare?",
  "Do I dare disturb the universe?",
  "In a minute there is time..."
];
let index = 0;

const text = document.getElementById("text");

text.addEventListener("mouseover", () => {
  // start dreamy background and echoes on first hover
  if (!started) {
    started = true;

    document.body.classList.add("dream");

    // floating echoes
    setInterval(() => {
      let echo = document.createElement("div");
      echo.className = "echo";
      echo.innerText = "Do I dare? Do I dare disturb the universe?";

      echo.style.left = Math.random() * window.innerWidth + "px";
      echo.style.top = window.innerHeight + "px";

      document.body.appendChild(echo);

      setTimeout(() => {
        echo.remove();
      }, 6000);
    }, 800);
  }

  // change central text to next line
  index = (index + 1) % lines.length;
  text.innerText = lines[index];
});
