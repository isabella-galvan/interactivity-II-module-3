<!DOCTYPE html>
<html>
<head>
  <title>Prufrock's Mantra</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: Arial, sans-serif;
      transition: all 3s ease;
      overflow: hidden;
    }

    #text {
      font-size: 2rem;
      transition: all 3s ease;
      cursor: pointer; /* hints that you can hover */
    }

    .dream {
      background: radial-gradient(circle, #3a2b1c, #0d0b0a);
      color: #f5e6c8;
      font-family: "Georgia", serif;
      letter-spacing: 2px;
    }

    .echo {
      position: absolute;
      opacity: 0.1;
      font-size: 2rem;
      color: #f5e6c8;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      from {
        transform: translateY(0px);
        opacity: 0.1;
      }
      to {
        transform: translateY(-200px);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<div id="text">Prufrock’s like... my mantra!</div>

<script>
let started = false;
const lines = [
  "Prufrock’s like my mantra",
  "Do I dare?",
  "Do I dare disturb the universe?",
  "In a minute there is time..."
];
let index = 0;

const text = document.getElementById("text");

text.addEventListener("mouseover", () => {
  if (!started) {
    started = true;

    // shift into "1920s dream"
    document.body.classList.add("dream");

    // floating echoes
    setInterval(() => {
      let echo = document.createElement("div");
      echo.className = "echo";
      echo.innerText = "Prufrock’s like my mantra";

      echo.style.left = Math.random() * window.innerWidth + "px";
      echo.style.top = window.innerHeight + "px";

      document.body.appendChild(echo);

      setTimeout(() => {
        echo.remove();
      }, 6000);
    }, 800);
  }

  // change the central text
  index = (index + 1) % lines.length;
  text.innerText = lines[index];
});
</script>

</body>
</html>
