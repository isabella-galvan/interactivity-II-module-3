<!DOCTYPE html>
<html>
<head>
  <title>Prufrock's Mantra</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      font-family: Arial, sans-serif;
      transition: all 2s ease;
      overflow: hidden;
    }

    #text {
      font-size: 2rem;
      transition: all 2s ease;
    }
  </style>
</head>
<body onclick="startDream()">
  <div id="text">Prufrock’s like my mantra</div>

  <script>
    let started = false;

    function startDream() {
      if (started) return;
      started = true;

      // background and font shift to dreamy 1920s
      document.body.style.background = "#3a2b1c";
      document.body.style.color = "#f5e6c8";
      document.body.style.fontFamily = "Georgia, serif";

      let text = document.getElementById("text");

      // show lines of Prufrock gradually
      setTimeout(() => { text.innerText = "Do I dare?"; }, 2000);
      setTimeout(() => { text.innerText = "Do I dare disturb the universe?"; }, 4000);
      setTimeout(() => { text.innerText = "In a minute there is time..."; }, 6000);
    }
  </script>
</body>
</html>
